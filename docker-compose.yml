version: '3.8'

services:

  # PHP 8.2 + Apache — serves the entire public_html
  php-apache:
    build: .
    container_name: akaroon_php
    ports:
      - "8082:80"
    volumes:
      - ./public_html:/var/www/html
      # Override wp-config files so WordPress connects to the local MySQL container
      - ./docker/wp-config-blog.php:/var/www/html/blog/wp-config.php
      - ./docker/wp-config-library.php:/var/www/html/library/wp-config.php
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # MySQL 8.0 — auto-imports available SQL dumps on first run
  mysql:
    image: mysql:8.0
    container_name: akaroon_mysql
    ports:
      - "127.0.0.1:3306:3306"   # localhost only — not exposed to LAN/internet
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_ROOT_HOST: '%'   # allow root connections from any host (needed by phpMyAdmin)
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
      # Init scripts run in alphabetical order on first container start
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./public_html/form/form-wizard.sql:/docker-entrypoint-initdb.d/02-form-wizard.sql
      - ./public_html/Live-Search/live_search.sql:/docker-entrypoint-initdb.d/03-live-search.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # phpMyAdmin — import WordPress DB dumps here at http://localhost:8081
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: akaroon_phpmyadmin
    ports:
      - "127.0.0.1:8081:80"   # localhost only — not exposed to LAN/internet
    env_file: .env
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: ${PMA_PASSWORD}
      UPLOAD_LIMIT: 512M    # large enough for WordPress DB exports
    depends_on:
      - mysql
    restart: unless-stopped

volumes:
  mysql_data:
